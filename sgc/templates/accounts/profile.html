{% extends 'base.html' %}
{% block title %}Mon profil — SGC{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h4 class="fw-bold mb-4"><i class="bi bi-person me-2 text-primary"></i>Mon profil</h4>
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Prénom</label>
              {{ form.first_name }}
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Nom</label>
              {{ form.last_name }}
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Email</label>
              {{ form.email }}
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Photo de profil</label>
              {{ form.avatar }}
              {% if profile.avatar %}
              <div class="mt-2">
                <img src="{{ profile.avatar.url }}" class="rounded-circle" style="width:64px;height:64px;object-fit:cover;">
              </div>
              {% endif %}
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">À propos</label>
              {{ form.bio }}
            </div>
          </div>
          <div class="d-flex justify-content-end mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle me-1"></i>Sauvegarder
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
