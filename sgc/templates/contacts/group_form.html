{% extends 'base.html' %}
{% block title %}{{ title }} — SGC{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{% url 'contacts:groups' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h4 class="fw-bold mb-0">{{ title }}</h4>
    </div>
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2 justify-content-end">
            <a href="{% url 'contacts:groups' %}" class="btn btn-outline-secondary">Annuler</a>
            <button type="submit" class="btn btn-primary">Sauvegarder</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
